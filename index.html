<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>直播排行榜 - 鼠鼠赏金赛（单三猛攻绝航）本周六</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Microsoft YaHei", sans-serif;
}

/* 直播专用：纯黑背景，方便透明抠图 */
body {
  background: #000000;
  color: #ffffff;
  padding: 20px;
}

/* 直播显示容器：干净无框 */
.box {
  max-width: 800px;
  margin: 0 auto;
  background: transparent;
  padding: 20px;
}

.title {
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  color: #00eeff;
  margin-bottom: 20px;
  text-shadow: 0 0 10px #00eeff;
}

/* 排行榜表格 - 直播画面只显示这个 */
.rank-table {
  width: 100%;
  border-collapse: collapse;
  background: rgba(0, 0, 0, 0.7);
  border-radius: 12px;
  overflow: hidden;
}

.rank-table th, .rank-table td {
  padding: 16px;
  text-align: center;
  font-size: 18px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.rank-table th {
  background: rgba(0, 60, 80, 0.8);
  color: #00eeff;
  font-size: 20px;
  text-shadow: 0 0 8px #00eeff;
}

/* 排名数字超大醒目 */
.rank-table td:nth-child(1) {
  font-size: 26px;
  font-weight: bold;
}

/* 前三名高亮特效 */
.rank-table tr:nth-child(1) td {
  background: rgba(255, 215, 0, 0.2);
  color: #ffd700;
  text-shadow: 0 0 10px #ffd700;
}
.rank-table tr:nth-child(2) td {
  background: rgba(192, 192, 192, 0.2);
  color: #c0c0c0;
}
.rank-table tr:nth-child(3) td {
  background: rgba(205, 127, 50, 0.2);
  color: #cd7f32;
}

/* ========== 控制面板（默认显示） ========== */
#controlPanel {
  position: fixed;
  top: 0;
  right: 0;
  width: 380px;
  height: 100vh;
  background: #111;
  padding: 20px;
  border-left: 2px solid #00eeff;
  overflow-y: auto;
  display: block;
  z-index: 999;
}

.player {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #333;
}

.score {
  width: 80px;
  padding: 6px;
  background: #222;
  border: 1px solid #00eeff;
  color: #fff;
  text-align: center;
  border-radius: 6px;
}

.btns {
  margin-top: 20px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.btn {
  padding: 8px 16px;
  background: #007bff;
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.btn:hover {
  opacity: 0.8;
}

/* 保存状态提示 */
.save-status {
  margin-top: 15px;
  color: #00eeff;
  font-size: 14px;
  text-align: center;
}
</style>
</head>

<body>
<!-- 直播画面 -->
<div class="box">
  <h1 class="title">👑 鼠鼠赏金赛（单三猛攻绝航）本周六实时排行榜</h1>
  <div id="result"></div>
</div>

<!-- 后台控制面板（默认显示） -->
<div id="controlPanel">
  <h3>后台控制面板（39人 · 自动保存）</h3>
  <div id="players" class="player-list"></div>
  <div class="btns">
    <button class="btn" onclick="reset()">清空重置</button>
    <button class="btn" onclick="exportExcel()">导出Excel</button>
    <button class="btn" style="background:#dc3545;" onclick="clearSavedData()">清除历史数据</button>
  </div>
  <div class="save-status" id="saveStatus">✅ 数据自动保存中</div>
</div>

<script>
// 从最新Excel提取的39人抖音ID名单（新增“蛋糕”）
const users = [
"瀚爱吃冰淇琳","牢","SUN","肸乯","波鲁鲁","今天中午吃啥呢",
"小刘大王","东","吃点小鱼干","赖皮婵","Yee","望如日出",
"妄想","愿望早点睡","我想意气风发","长期喝假酒6657","困男",
"喝茶吗","552758","喝可乐","现实是头猪","小猫星期五",
"癞蛤蟆想吃天鹅肉","你爷爷睡觉呢","永世","Capricorn666",
"🌈🌈🌈Y.","12un","五号球","徐绝对不虚","December","琳墨",
"😫","寄18弟","Edwad","aaa","小玲","林痕","蛋糕"
];

// 本地存储key（用于标识本活动的数据）
const STORAGE_KEY = "shushu_bounty_match_scores_2024";

// 初始化后台面板 + 加载历史数据
function init() {
  const wrap = document.getElementById("players");
  // 1. 先获取本地存储的历史分数
  const savedScores = getSavedScores();
  
  // 2. 创建玩家分数输入框
  users.forEach((u, i) => {
    const item = document.createElement("div");
    item.className = "player";
    // 加载历史分数（如果有的话）
    const savedScore = savedScores[i] || "";
    item.innerHTML = `<div>${u}</div><input type="number" class="score" id="s${i}" placeholder="分数" value="${savedScore}" oninput="handleScoreChange(${i})">`;
    wrap.appendChild(item);
  });
  
  // 3. 初始化排名显示
  autoRank();
  showSaveStatus("✅ 已加载历史数据");
}

// 处理分数变化（同步排名 + 保存数据）
function handleScoreChange(index) {
  const scoreInput = document.getElementById(`s${i}`);
  const score = scoreInput.value || "0";
  
  // 1. 更新排名
  autoRank();
  
  // 2. 保存到本地存储
  saveScoresToLocal();
  
  // 3. 显示保存状态提示
  showSaveStatus("✅ 数据已保存");
  
  // 4. 3秒后恢复默认提示
  setTimeout(() => {
    showSaveStatus("✅ 数据自动保存中");
  }, 3000);
}

// 自动实时更新排名（直播画面同步）
function autoRank() {
  const arr = [];
  users.forEach((u, i) => {
    const v = document.getElementById(`s${i}`)?.value || "0";
    const num = parseInt(v) || 0;
    arr.push({ name: u, score: num });
  });
  arr.sort((a, b) => b.score - a.score);

  let html = `<table class="rank-table"><tr><th>排名</th><th>抖音ID</th><th>积分</th></tr>`;
  arr.forEach((it, i) => {
    let rank = i + 1;
    if (i === 0) rank = "👑 1";
    html += `<tr><td>${rank}</td><td>${it.name}</td><td>${it.score}</td></tr>`;
  });
  html += `</table>`;
  document.getElementById("result").innerHTML = html;
}

// 从本地存储获取历史分数
function getSavedScores() {
  try {
    const savedData = localStorage.getItem(STORAGE_KEY);
    return savedData ? JSON.parse(savedData) : [];
  } catch (e) {
    console.error("读取本地存储失败：", e);
    return [];
  }
}

// 保存当前分数到本地存储
function saveScoresToLocal() {
  try {
    const currentScores = users.map((_, i) => {
      return document.getElementById(`s${i}`)?.value || "";
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(currentScores));
  } catch (e) {
    console.error("保存到本地存储失败：", e);
    showSaveStatus("❌ 保存失败，请重试");
  }
}

// 显示保存状态提示
function showSaveStatus(message) {
  const statusElement = document.getElementById("saveStatus");
  statusElement.textContent = message;
}

// 清空重置（同时清除本地存储）
function reset() {
  if (confirm("确定要清空所有分数吗？此操作不可恢复！")) {
    document.querySelectorAll(".score").forEach(i => i.value = "");
    localStorage.removeItem(STORAGE_KEY);
    autoRank();
    showSaveStatus("✅ 已清空所有数据");
  }
}

// 清除历史数据（单独功能）
function clearSavedData() {
  if (confirm("确定要清除所有历史保存数据吗？")) {
    localStorage.removeItem(STORAGE_KEY);
    showSaveStatus("✅ 历史数据已清除");
    // 刷新页面加载空数据
    setTimeout(() => {
      window.location.reload();
    }, 1000);
  }
}

// 导出Excel
function exportExcel() {
  const arr = [];
  users.forEach((u, i) => {
    const v = document.getElementById(`s${i}`)?.value || "0";
    arr.push({ name: u, score: parseInt(v) || 0 });
  });
  arr.sort((a, b) => b.score - a.score);
  let csv = "排名,抖音ID,分数\n";
  arr.forEach((it, i) => {
    csv += `${i + 1},"${it.name}",${it.score}\n`;
  });
  const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "鼠鼠赏金赛（单三猛攻绝航）本周六排行榜.csv";
  a.click();
  showSaveStatus("✅ 导出成功");
}

// 页面加载时初始化
window.onload = init;
</script>
</body>
</html>
