<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>✨ 自定义排行榜工坊 | 自由编辑你的榜单</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f4f7fc 0%, #e9eef4 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        /* 主容器 */
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 卡片通用样式 */
        .card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1), 0 1px 2px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* 头部设置区 */
        .settings-panel {
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 1.2rem;
            justify-content: space-between;
        }

        .config-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            flex: 2;
        }

        .config-item {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            min-width: 140px;
        }

        .config-item label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #4a5b6e;
        }

        .config-item input {
            background: #ffffff;
            border: 1px solid #cfdee9;
            padding: 0.6rem 1rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            transition: 0.2s;
            outline: none;
            font-weight: 500;
        }

        .config-item input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .sort-actions {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #b9cad9;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #2c3e4e;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-outline:hover {
            background: #eef3fc;
            border-color: #6c8fb0;
            transform: translateY(-1px);
        }

        .btn-primary {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 0.6rem 1.4rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(59, 130, 246, 0.25);
        }

        .btn-danger {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fbc4c4;
        }

        .btn-danger:hover {
            background: #ffd6d6;
            border-color: #ef4444;
            color: #991b1b;
        }

        /* 表单卡片 (添加/编辑) */
        .form-card {
            padding: 1.2rem 2rem 1.5rem;
            margin-bottom: 2rem;
            background: white;
        }

        .form-title {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: #1f2a3e;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .inline-form {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 1.2rem;
        }

        .field {
            flex: 1;
            min-width: 160px;
        }

        .field label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #5c6f87;
            margin-bottom: 0.3rem;
        }

        .field input {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 1.5rem;
            border: 1px solid #d4dfea;
            background: #fefefe;
            transition: 0.2s;
        }

        .field input:focus {
            border-color: #3b82f6;
            outline: none;
            background: white;
        }

        .form-buttons {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .badge-edit {
            background: #eef2ff;
            border-radius: 2rem;
            padding: 0.3rem 1rem;
            font-size: 0.75rem;
            color: #1e40af;
        }

        /* 排行榜主体 */
        .rank-card {
            padding: 0rem 0rem 1rem 0rem;
            overflow-x: auto;
        }

        .rank-header {
            padding: 1.2rem 1.5rem 0.5rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            border-bottom: 2px solid #eef2f8;
        }

        .stats {
            display: flex;
            gap: 1.5rem;
            font-size: 0.85rem;
            color: #4b5e77;
            background: #f8fafd;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
        }

        .stats span {
            font-weight: 700;
            color: #1e2a44;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 1.2rem 1rem 0.8rem 1rem;
            font-weight: 700;
            color: #2c3e50;
            background: #fdfdfe;
            border-bottom: 1px solid #e2edf2;
            font-size: 0.9rem;
        }

        td {
            padding: 1rem 1rem;
            border-bottom: 1px solid #edf2f7;
            vertical-align: middle;
            font-size: 0.95rem;
        }

        .rank-number {
            font-weight: 800;
            font-size: 1.2rem;
            color: #4b6a8b;
            width: 60px;
        }

        .item-name {
            font-weight: 600;
            color: #1e2f3f;
        }

        .item-score {
            font-weight: 700;
            font-family: monospace;
            font-size: 1.05rem;
            color: #0f3b5c;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 2rem;
            transition: all 0.15s;
            opacity: 0.7;
        }

        .icon-btn:hover {
            opacity: 1;
            background: #eef3fa;
            transform: scale(1.05);
        }

        .empty-row td {
            text-align: center;
            padding: 3rem;
            color: #8ba0b5;
            font-style: italic;
        }

        /* 响应式 */
        @media (max-width: 780px) {
            body {
                padding: 1rem;
            }
            .settings-panel {
                flex-direction: column;
                align-items: stretch;
            }
            .config-group {
                flex-direction: column;
            }
            .inline-form {
                flex-direction: column;
                align-items: stretch;
            }
            th, td {
                padding: 0.8rem 0.5rem;
            }
            .rank-number {
                width: 40px;
            }
        }
    </style>
</head>
<body>
<div class="dashboard">
    <!-- 自定义设置卡片 -->
    <div class="card settings-panel">
        <div class="config-group">
            <div class="config-item">
                <label>🏆 榜单标题</label>
                <input type="text" id="rankTitleInput" placeholder="例如：巅峰荣耀榜" value="✨ 自定义排行榜">
            </div>
            <div class="config-item">
                <label>📛 名称列名</label>
                <input type="text" id="colNameInput" placeholder="选手 / 项目" value="挑战者">
            </div>
            <div class="config-item">
                <label>⭐ 数值列名</label>
                <input type="text" id="colScoreInput" placeholder="分数 / 成就值" value="荣耀积分">
            </div>
        </div>
        <div class="sort-actions">
            <button id="toggleSortBtn" class="btn-outline" style="background:#f0f4f9;">🔽 降序排列</button>
            <button id="resetExampleBtn" class="btn-outline">📋 重置示例</button>
            <button id="clearAllBtn" class="btn-outline btn-danger">🗑️ 清空榜单</button>
        </div>
    </div>

    <!-- 添加 / 编辑条目卡片 -->
    <div class="card form-card">
        <div class="form-title">
            <span>✏️ 管理榜单项目</span>
            <span id="editModeBadge" class="badge-edit" style="display: none;">编辑模式</span>
        </div>
        <div class="inline-form">
            <div class="field">
                <label id="nameFieldLabel">名称</label>
                <input type="text" id="itemNameInput" placeholder="例如：干员K / 队伍alpha" autocomplete="off">
            </div>
            <div class="field">
                <label id="scoreFieldLabel">数值</label>
                <input type="number" id="itemScoreInput" placeholder="分数 / 数值" step="any" value="100">
            </div>
            <div class="form-buttons">
                <button id="saveItemBtn" class="btn-primary">➕ 添加 / 更新</button>
                <button id="cancelEditBtn" class="btn-outline" style="display: none;">取消编辑</button>
            </div>
        </div>
        <div style="font-size: 0.7rem; margin-top: 12px; color: #6e889b;">💡 提示：可随时添加/修改，自动根据数值排序。编辑时点击条目旁的✏️即可。</div>
    </div>

    <!-- 排行榜展示区 -->
    <div class="card rank-card">
        <div class="rank-header">
            <h2 id="dynamicRankTitle" style="font-weight: 700; letter-spacing: -0.3px;">✨ 自定义排行榜</h2>
            <div class="stats" id="statsPanel">
                <span>📊 条目: <span id="totalCount">0</span></span>
                <span>🏅 总分: <span id="totalScore">0</span></span>
                <span>⚖️ 平均: <span id="avgScore">0</span></span>
            </div>
        </div>
        <div style="overflow-x: auto;">
            <table id="rankTable">
                <thead id="tableHeader">
                    <tr>
                        <th># 排名</th>
                        <th id="nameColHeader">挑战者</th>
                        <th id="scoreColHeader">荣耀积分</th>
                        <th style="width: 100px;">操作</th>
                    </tr>
                </thead>
                <tbody id="rankTableBody">
                    <tr class="empty-row"><td colspan="4">✨ 暂无数据，点击上方添加你的第一个项目吧</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ---------- 核心数据 ----------
    let rankingItems = [];        // 存储对象 { id, name, score }
    let editId = null;            // 当前编辑的id
    let sortDirection = 'desc';   // 'desc' 高分在上 , 'asc' 低分在上

    // ---------- DOM 元素 ----------
    // 设置域
    const rankTitleInput = document.getElementById('rankTitleInput');
    const colNameInput = document.getElementById('colNameInput');
    const colScoreInput = document.getElementById('colScoreInput');
    const toggleSortBtn = document.getElementById('toggleSortBtn');
    const resetExampleBtn = document.getElementById('resetExampleBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    // 表单域
    const itemNameInput = document.getElementById('itemNameInput');
    const itemScoreInput = document.getElementById('itemScoreInput');
    const saveItemBtn = document.getElementById('saveItemBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const editModeBadge = document.getElementById('editModeBadge');
    // 展示域
    const dynamicRankTitle = document.getElementById('dynamicRankTitle');
    const nameColHeader = document.getElementById('nameColHeader');
    const scoreColHeader = document.getElementById('scoreColHeader');
    const rankTableBody = document.getElementById('rankTableBody');
    const totalCountSpan = document.getElementById('totalCount');
    const totalScoreSpan = document.getElementById('totalScore');
    const avgScoreSpan = document.getElementById('avgScore');
    // 字段标签 (可选样式)
    const nameFieldLabel = document.getElementById('nameFieldLabel');
    const scoreFieldLabel = document.getElementById('scoreFieldLabel');

    // ---------- 本地存储KEY ----------
    const STORAGE_ITEMS = 'custom_rank_items';
    const STORAGE_SETTINGS = 'custom_rank_settings';
    const STORAGE_SORT = 'custom_rank_sortDir';

    // ---------- 辅助函数 ----------
    function saveItemsToLocal() {
        localStorage.setItem(STORAGE_ITEMS, JSON.stringify(rankingItems));
    }

    function loadItemsFromLocal() {
        const stored = localStorage.getItem(STORAGE_ITEMS);
        if (stored) {
            try {
                rankingItems = JSON.parse(stored);
                // 确保每个对象都有id和老数据兼容（之前未加id? 防御）
                if (!rankingItems.every(item => item.hasOwnProperty('id'))) {
                    rankingItems = rankingItems.map(item => ({ ...item, id: item.id || Date.now() + Math.random() + '' }));
                    saveItemsToLocal();
                }
            } catch(e) { rankingItems = []; }
        }
        if (!rankingItems.length) {
            // 默认示例数据
            rankingItems = [
                { id: 'init1', name: '暗影刺客 · 零', score: 986 },
                { id: 'init2', name: '霜月剑姬', score: 1240 },
                { id: 'init3', name: '星尘咏者', score: 752 },
                { id: 'init4', name: '机械先驱', score: 1103 },
            ];
            saveItemsToLocal();
        }
    }

    function saveSettingsToLocal() {
        const settings = {
            rankTitle: rankTitleInput.value,
            colName: colNameInput.value,
            colScore: colScoreInput.value,
        };
        localStorage.setItem(STORAGE_SETTINGS, JSON.stringify(settings));
    }

    function loadSettingsFromLocal() {
        const stored = localStorage.getItem(STORAGE_SETTINGS);
        if (stored) {
            try {
                const settings = JSON.parse(stored);
                if (settings.rankTitle) rankTitleInput.value = settings.rankTitle;
                if (settings.colName) colNameInput.value = settings.colName;
                if (settings.colScore) colScoreInput.value = settings.colScore;
            } catch(e) {}
        }
        // 加载排序方向
        const savedSort = localStorage.getItem(STORAGE_SORT);
        if (savedSort === 'asc' || savedSort === 'desc') {
            sortDirection = savedSort;
        } else {
            sortDirection = 'desc';
        }
        updateSortButtonText();
    }

    function updateSortButtonText() {
        if (sortDirection === 'desc') {
            toggleSortBtn.innerHTML = '🔽 降序排列 (高分在前)';
        } else {
            toggleSortBtn.innerHTML = '🔼 升序排列 (低分在前)';
        }
    }

    function saveSortDirection() {
        localStorage.setItem(STORAGE_SORT, sortDirection);
        updateSortButtonText();
    }

    // ---------- 渲染排行榜 (核心) ----------
    function renderRanking() {
        // 1. 获取自定义列名
        const customName = colNameInput.value.trim() || "名称";
        const customScore = colScoreInput.value.trim() || "分数";
        nameColHeader.innerText = customName;
        scoreColHeader.innerText = customScore;
        // 动态改变表单标签（增强一致性）
        nameFieldLabel.innerText = customName;
        scoreFieldLabel.innerText = customScore;

        // 2. 标题更新
        const titleRaw = rankTitleInput.value.trim();
        dynamicRankTitle.innerText = titleRaw || "自定义排行榜";

        // 3. 数据排序 (根据sortDirection)
        const sorted = [...rankingItems].sort((a, b) => {
            if (sortDirection === 'desc') return b.score - a.score;
            else return a.score - b.score;
        });

        // 4. 统计信息
        const total = rankingItems.length;
        const totalScore = rankingItems.reduce((sum, cur) => sum + (typeof cur.score === 'number' ? cur.score : 0), 0);
        const avg = total === 0 ? 0 : (totalScore / total).toFixed(1);
        totalCountSpan.innerText = total;
        totalScoreSpan.innerText = totalScore.toLocaleString();
        avgScoreSpan.innerText = avg;

        // 5. 渲染表格body
        if (total === 0) {
            rankTableBody.innerHTML = `<tr class="empty-row"><td colspan="4">🏷️ 暂无数据，点击上方添加你的第一个项目吧</td></tr>`;
            return;
        }

        let html = '';
        sorted.forEach((item, idx) => {
            const rank = idx + 1;
            // 处理名称、分数显示
            const displayName = escapeHtml(item.name) || '未命名';
            const displayScore = typeof item.score === 'number' ? item.score.toLocaleString() : item.score;
            html += `
                <tr data-id="${item.id}">
                    <td class="rank-number">${rank}</td>
                    <td class="item-name">${displayName}</td>
                    <td class="item-score">⭐ ${displayScore}</td>
                    <td class="action-buttons">
                        <button class="icon-btn edit-item" data-id="${item.id}" title="编辑">✏️</button>
                        <button class="icon-btn delete-item" data-id="${item.id}" title="删除">🗑️</button>
                    </td>
                </tr>
            `;
        });
        rankTableBody.innerHTML = html;

        // 绑定动态按钮事件 (编辑/删除)
        document.querySelectorAll('.edit-item').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                startEditById(id);
            });
        });
        document.querySelectorAll('.delete-item').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                deleteItemById(id);
            });
        });
    }

    // 简单的防XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // ---------- 数据操作 CRUD ----------
    function addOrUpdateItem() {
        let name = itemNameInput.value.trim();
        let scoreRaw = itemScoreInput.value.trim();

        if (name === "") {
            alert(`❌ 请填写${colNameInput.value.trim() || "名称"}`);
            return;
        }
        let scoreNum = parseFloat(scoreRaw);
        if (isNaN(scoreNum)) {
            alert(`❌ 数值必须是有效数字，当前输入: ${scoreRaw}`);
            return;
        }
        // 允许负数? 排行榜一般允许正负但随意，保留灵活性
        scoreNum = Math.round(scoreNum * 10) / 10; // 保留一位小数清爽

        if (editId !== null) {
            // 更新模式
            const index = rankingItems.findIndex(item => item.id === editId);
            if (index !== -1) {
                rankingItems[index].name = name;
                rankingItems[index].score = scoreNum;
            }
            // 退出编辑模式
            resetEditMode();
        } else {
            // 新增模式
            const newId = Date.now() + '-' + Math.random().toString(36).substr(2, 6);
            rankingItems.push({
                id: newId,
                name: name,
                score: scoreNum,
            });
        }
        // 保存 & 渲染
        saveItemsToLocal();
        renderRanking();
        clearForm();
    }

    function startEditById(id) {
        const targetItem = rankingItems.find(item => item.id === id);
        if (!targetItem) return;
        editId = id;
        itemNameInput.value = targetItem.name;
        itemScoreInput.value = targetItem.score;
        saveItemBtn.innerText = '✏️ 更新项目';
        cancelEditBtn.style.display = 'inline-flex';
        editModeBadge.style.display = 'inline-block';
        // 滚动到表单
        document.querySelector('.form-card').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function resetEditMode() {
        editId = null;
        saveItemBtn.innerText = '➕ 添加 / 更新';
        cancelEditBtn.style.display = 'none';
        editModeBadge.style.display = 'none';
        clearForm();
    }

    function clearForm() {
        if (editId === null) {
            itemNameInput.value = '';
            itemScoreInput.value = '100';
        } else {
            // 在重置编辑模式后再清空，但不用重复清太狠
        }
    }

    function deleteItemById(id) {
        const item = rankingItems.find(i => i.id === id);
        if (!item) return;
        const confirmMsg = `确定要删除「${item.name}」吗？`;
        if (confirm(confirmMsg)) {
            rankingItems = rankingItems.filter(item => item.id !== id);
            if (editId === id) {
                resetEditMode();
            }
            saveItemsToLocal();
            renderRanking();
        }
    }

    function resetToExample() {
        if (confirm("重置示例数据会覆盖当前所有自定义内容，确定吗？")) {
            rankingItems = [
                { id: 'ex1', name: '绯红魔导师', score: 1472 },
                { id: 'ex2', name: '霜巨人守护者', score: 823 },
                { id: 'ex3', name: '灵风斥候', score: 2005 },
                { id: 'ex4', name: '钢铁壁垒', score: 655 },
                { id: 'ex5', name: '月影舞者', score: 1198 },
            ];
            if (editId) resetEditMode();
            saveItemsToLocal();
            renderRanking();
        }
    }

    function clearAllItems() {
        if (confirm("⚠️ 清空所有榜单项目，不可撤销。确定吗？")) {
            rankingItems = [];
            if (editId) resetEditMode();
            saveItemsToLocal();
            renderRanking();
        }
    }

    // 切换排序方向
    function toggleSortDirection() {
        sortDirection = sortDirection === 'desc' ? 'asc' : 'desc';
        saveSortDirection();
        renderRanking();   // 重新排序渲染
    }

    // 监听设置变化，实时刷新界面（标题，列名）
    function bindSettingsWatchers() {
        const updateFromSettings = () => {
            saveSettingsToLocal();
            renderRanking();  // 列名/标题改变立马重绘
        };
        rankTitleInput.addEventListener('input', updateFromSettings);
        colNameInput.addEventListener('input', updateFromSettings);
        colScoreInput.addEventListener('input', updateFromSettings);
    }

    // 全局监听取消编辑
    function bindFormActions() {
        saveItemBtn.addEventListener('click', addOrUpdateItem);
        cancelEditBtn.addEventListener('click', () => {
            resetEditMode();
            renderRanking(); // 重置后刷新（避免残留高亮）
        });
        // 清空输入框的小优化: 但不要干扰编辑，直接提供一个复位感觉不太需要，用户手动清除就好
    }

    // 监听重置、清空、排序按钮
    function bindUtilityButtons() {
        resetExampleBtn.addEventListener('click', resetToExample);
        clearAllBtn.addEventListener('click', clearAllItems);
        toggleSortBtn.addEventListener('click', toggleSortDirection);
    }

    // 初始化加载数据与渲染
    function init() {
        loadItemsFromLocal();
        loadSettingsFromLocal();
        bindSettingsWatchers();
        bindFormActions();
        bindUtilityButtons();
        renderRanking();
        // 如果表单处于非编辑状态，输入框保持默认清爽
        if (!editId) {
            itemNameInput.value = '';
            itemScoreInput.value = '100';
        }
    }

    // 启动一切
    init();
</script>
</body>
</html>
